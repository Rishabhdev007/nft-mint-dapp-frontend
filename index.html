<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  

  <title>NFT Dashboard</title>
  <h1>Mint Your Own NFT on Ethereum</h1>
<p>Simple, fast and decentralized NFT minting experience.</p>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🚀 NFT Mint Dashboard</h1>

  <!-- WALLET PANEL -->
  <div class="card">
    <h2>Wallet</h2>
    <button id="connectBtn">Connect Wallet</button>
    <p id="wallet">Not connected</p>
  </div>

  <!-- MINT PANEL -->
  <div class="card">
    <h2>Mint NFT</h2>
    <button id="mintBtn">Mint NFT</button>
    <p id="status">Status: Idle</p>
  </div>

  <!-- TRANSACTION PANEL -->
  <div class="card">
    <h2>Recent Transactions</h2>
    <ul id="txList"></ul>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
